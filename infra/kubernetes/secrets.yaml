# infra/kubernetes/secrets.yaml
# This file contains the credentials needed by Airflow and Spark jobs.
# Apply to each namespace:
# kubectl apply -f infra/kubernetes/secrets.yaml -n airflow
# kubectl apply -f infra/kubernetes/secrets.yaml -n spark-jobs

---
# Secret for MinIO credentials
apiVersion: v1
kind: Secret
metadata:
  name: minio-credentials
type: Opaque
data:
  # Key values expected by the PySpark jobs and Spark History Server
  # The keys are: MINIO_ACCESS_KEY and MINIO_SECRET_KEY
  # These correspond to the 'minio' and 'minio123' values in minio-values.yaml
  MINIO_ACCESS_KEY: bWluaW8= # minio
  MINIO_SECRET_KEY: bWluaW8xMjM= # minio123
  
  # Keys used by the Spark History Server Helm chart config
  # These correspond to the 'minio' and 'minio123' values in minio-values.yaml
  accessKey: bWluaW8= # minio
  secretKey: bWluaW8xMjM= # minio123

---
# Secret for PostgreSQL data source credentials
apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
type: Opaque
data:
  # The values correspond to what's in postgres-values.yaml and K8s service names
  POSTGRES_HOST: cG9zdGdyZXMtcG9zdGdyZXNxbC5wb3N0Z3Jlcy5zdmMuY2x1c3Rlci5sb2NhbA== # postgres-postgresql.postgres.svc.cluster.local
  POSTGRES_PORT: NTQzMg== # 5432
  POSTGRES_USER: YWRtaW4= # admin
  POSTGRES_PASSWORD: cGFzc3dvcmQxMjM= # password123
  POSTGRES_DB: c2FsZXNkYg== # salesdb
