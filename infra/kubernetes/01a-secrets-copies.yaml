# infra/kubernetes/01a-secrets-copies.yaml
# Cria cópias dos secrets nos namespaces que precisam deles.

# --- Cópia para o namespace 'airflow' ---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: airflow
type: Opaque
data:
  # Base64 encoded values
  username: YWRtaW4= # "admin"
  password: cGFzc3dvcmQxMjM= # "password123"
  database: c2FsZXNkYg== # "salesdb"

---
apiVersion: v1
kind: Secret
metadata:
  name: minio-credentials
  namespace: airflow
type: Opaque
data:
  rootUser: bWluaW8= # "minio"
  rootPassword: bWluaW8xMjM= # "minio123"

# --- Cópia para o namespace 'spark-jobs' ---
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: spark-jobs
type: Opaque
data:
  username: YWRtaW4= # "admin"
  password: cGFzc3dvcmQxMjM= # "password123"
  database: c2FsZXNkYg== # "salesdb"

---
apiVersion: v1
kind: Secret
metadata:
  name: minio-credentials
  namespace: spark-jobs
type: Opaque
data:
  rootUser: bWluaW8= # "minio"
  rootPassword: bWluaW8xMjM= # "minio123"
