# infra/kubernetes/02-postgres-configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init-script
  namespace: postgres
data:
  01_create_sales_table.sql: |
    -- Cria a tabela de vendas se ela não existir.
    CREATE TABLE IF NOT EXISTS public.sales (
        id SERIAL PRIMARY KEY,
        order_id VARCHAR(50) NOT NULL,
        customer_id VARCHAR(50) NOT NULL,
        product_id VARCHAR(50) NOT NULL,
        quantity INTEGER NOT NULL,
        unit_price NUMERIC(10, 2) NOT NULL,
        order_date TIMESTAMP NOT NULL,
        status VARCHAR(20)
    );
    
    -- Garante que a tabela esteja vazia antes de inserir dados de teste.
    TRUNCATE TABLE public.sales;

    -- Insere dados de teste, incluindo uma duplicata para testar a lógica de deduplicação.
    INSERT INTO public.sales (order_id, customer_id, product_id, quantity, unit_price, order_date, status) VALUES
    ('ORD-001', 'CUST-101', 'PROD-A', 2, 15.50, '2026-01-15 10:00:00', 'COMPLETED'),
    ('ORD-002', 'CUST-102', 'PROD-B', 1, 120.00, '2026-01-15 11:30:00', 'COMPLETED'),
    ('ORD-003', 'CUST-101', 'PROD-C', 5, 5.00, '2026-01-16 14:00:00', 'COMPLETED'),
    ('ORD-004', 'CUST-103', 'PROD-A', 1, 15.50, '2026-01-17 12:00:00', 'COMPLETED'),
    -- Registro duplicado com status diferente para testar a lógica de manter o mais recente.
    ('ORD-001', 'CUST-101', 'PROD-A', 2, 15.50, '2026-01-15 10:00:00', 'RETURNED');
