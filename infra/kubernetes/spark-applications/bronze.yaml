apiVersion: "sparkoperator.k8s.io/v1beta2"
kind: SparkApplication
metadata:
  name: pyspark-bronze-ingest
  namespace: spark-jobs
spec:
  type: Python
  pythonVersion: "3"
  mode: cluster
  image: "localhost:5000/pyspark-basic-spark:latest"
  imagePullPolicy: IfNotPresent
  mainApplicationFile: "local:///opt/spark/work-dir/spark_jobs/bronze/ingest_postgres.py"
  sparkVersion: "3.5"
  restartPolicy:
    type: Never
  
  # Add Delta Lake and PostgreSQL JDBC driver packages
  deps:
    packages:
      - "io.delta:delta-spark_2.12:3.1.0" 
      - "org.postgresql:postgresql:42.6.0"

  # Dynamic Allocation settings for true elasticity
  dynamicAllocation:
    enabled: true
    initialExecutors: 1
    minExecutors: 1
    maxExecutors: 10
    shuffleTrackingTimeout: 60

  # Spark UI and logging configurations
  sparkConf:
    spark.ui.port: "4040"
    # Configure Spark to use the S3A filesystem connector with MinIO
    spark.hadoop.fs.s3a.endpoint: "http://minio.minio.svc.cluster.local:9000"
    spark.hadoop.fs.s3a.path.style.access: "true"
    spark.hadoop.fs.s3a.connection.ssl.enabled: "false"
    # Event log for Spark History Server
    spark.eventLog.enabled: "true"
    spark.eventLog.dir: "s3a://spark-logs/"

  driver:
    cores: 1
    memory: "1024m"
    labels:
      version: 3.5.0
    # Service account for accessing Kubernetes resources
    serviceAccount: spark
    envFrom:
      - secretRef:
          name: postgres-credentials
      - secretRef:
          name: minio-credentials

  executor:
    cores: 1
    instances: 1 # Initial number of executors
    memory: "1024m"
    labels:
      version: 3.5.0
    envFrom:
      - secretRef:
          name: minio-credentials
