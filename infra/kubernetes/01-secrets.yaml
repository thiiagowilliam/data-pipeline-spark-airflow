# infra/kubernetes/01-secrets.yaml
# Define os secrets primários para as aplicações.

apiVersion: v1
kind: Secret
metadata:
  # Secret para o banco de dados PostgreSQL.
  # Será usado pelo chart do Helm do Postgres para pegar suas credenciais.
  name: postgres-credentials
  namespace: postgres
type: Opaque
data:
  # As chaves 'username' e 'password' são esperadas pelo chart do Bitnami
  username: YWRtaW4= # "admin"
  password: cGFzc3dvcmQxMjM= # "password123"
  database: c2FsZXNkYg== # "salesdb"

---
apiVersion: v1
kind: Secret
metadata:
  # Secret para o object storage MinIO.
  name: minio-credentials
  namespace: minio
type: Opaque
data:
  # As chaves 'rootUser' e 'rootPassword' são esperadas pelo chart do Bitnami
  rootUser: bWluaW8= # "minio"
  rootPassword: bWluaW8xMjM= # "minio123"
