# .github/workflows/ci-cd.yaml
name: CI — Lint, Test & DAG Verify

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint:
    name: 🔍 Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pre-commit

      - name: Run pre-commit hooks
        run: pre-commit run --all-files

  test:
    name: 🧪 Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-cov

      - name: Run tests with coverage
        run: |
          pytest tests/ -v --cov=simulator --cov-report=term-missing

  verify-dag:
    name: ✅ DAG Parse Check
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify DAG syntax
        run: |
          python3 -c "
          import ast
          files = [
              'airflow/dags/bronze_pipeline.py',
              'airflow/dags/scripts/spark_jobs/spark_config.py',
              'airflow/dags/scripts/spark_jobs/validate.py',
              'airflow/dags/scripts/spark_jobs/validate_data.py',
              'airflow/dags/scripts/spark_jobs/bronze_ingest.py',
          ]
          for f in files:
              ast.parse(open(f).read())
              print(f'✅ {f}')
          print('All files parsed successfully.')
          "