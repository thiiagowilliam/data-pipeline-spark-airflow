config_version: 3.0

datasources:
  spark_minio_datasource:
    module_name: great_expectations.datasource
    class_name: SparkDFDatasource
    data_asset_type:
      class_name: SparkDFDataset
    batch_kwargs_generators:
      subdir_reader:
        class_name: SubdirReaderBatchKwargsGenerator
        base_directory: s3a://datalake/raw/

execution_engine:
  module_name: great_expectations.execution_engine
  class_name: SparkDFExecutionEngine

data_docs_sites:
  local_site:
    class_name: SiteBuilder
    store_backend:
      class_name: TupleFilesystemStoreBackend
      base_directory: great_expectations/uncommitted/data_docs/local_site/
    site_index_builder:
      class_name: DefaultSiteIndexBuilder

validation_operators:
  action_list_operator:
    class_name: ActionListValidationOperator
    action_list:
      - name: store_validation_result
        action:
          class_name: StoreValidationResultAction
      - name: store_evaluation_params
        action:
          class_name: StoreEvaluationParametersAction
      - name: update_data_docs
        action:
          class_name: UpdateDataDocsAction

stores:
  expectations_store:
    class_name: ExpectationsStore
    store_backend:
      class_name: TupleFilesystemStoreBackend
      base_directory: great_expectations/expectations/

  validations_store:
    class_name: ValidationsStore
    store_backend:
      class_name: TupleFilesystemStoreBackend
      base_directory: great_expectations/uncommitted/validations/

  evaluation_parameter_store:
    class_name: EvaluationParameterStore
    store_backend:
      class_name: TupleFilesystemStoreBackend
      base_directory: great_expectations/uncommitted/evaluation_parameter_store/

  checkpoint_store:
    class_name: CheckpointStore
    store_backend:
      class_name: TupleFilesystemStoreBackend
      base_directory: great_expectations/checkpoints/

anonymous_usage_statistics:
  enabled: true
  data_context_id: localhost
