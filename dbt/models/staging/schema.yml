# dbt/models/staging/schema.yml
version: 2

sources:
  - name: public
    schema: public
    tables:
      - name: vendas_staging

models:
  - name: stg_vendas
    description: "Staging model for sales data."
    columns:
      - name: id
        description: "Unique identifier for the sale record."
        tests:
          - not_null
          - unique
      - name: customer_id
        description: "Identifier for the customer."
        tests:
          - not_null
      - name: product
        description: "Name of the product sold."
        tests:
          - accepted_values:
              values: ['Laptop', 'Mouse', 'Keyboard', 'Monitor', 'Webcam', 'Docking Station', 'Headset']
      - name: qty
        description: "Quantity of the product sold."
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_of_type:
              column_type: INTEGER
      - name: price
        description: "Price per unit of the product."
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0.01
              max_value: 20000.00
      - name: order_date
        description: "Timestamp of the order."
        tests:
          - not_null
