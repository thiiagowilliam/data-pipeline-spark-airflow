# ====================== ANCHORS ======================
x-airflow-common-env: &airflow-common-env
  AIRFLOW__CORE__EXECUTOR: CeleryExecutor
  AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
  AIRFLOW__CORE__FERNET_KEY: ''
  AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
  AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
  AIRFLOW__CELERY__BROKER_URL: redis://:@redis:6379/0
  AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://airflow:airflow@postgres/airflow
  AIRFLOW__OPERATORS__DEFAULT_QUEUE: default
  PYTHONPATH: /opt/airflow/dags:/opt/airflow/dags/scripts
  

  AWS_ACCESS_KEY_ID: minioadmin
  AWS_SECRET_ACCESS_KEY: minioadmin
  AWS_DEFAULT_REGION: us-east-1
  MINIO_ENDPOINT: http://minio:9000

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile.airflow
  user: "${AIRFLOW_UID:-50000}:0"
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/logs:/opt/airflow/logs
    - ./airflow/plugins:/opt/airflow/plugins
  networks:
    - airflow-net
  environment: *airflow-common-env

services:

  postgres:
    image: postgres:16
    container_name: airflow_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database:/docker-entrypoint-initdb.d
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - airflow-net

  redis:
    image: redis:7-alpine
    container_name: airflow_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - airflow-net

  minio:
    image: minio/minio:latest
    container_name: minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - airflow-net

  spark-master:
    image: apache/spark:3.5.1
    container_name: spark-master
    restart: unless-stopped
    environment:
      - SPARK_MODE=master
      - SPARK_HISTORY_OPTS=-Dspark.history.fs.logDirectory=/opt/spark/spark-events
      - SPARK_EVENTLOG_ENABLED=true
      - SPARK_EVENTLOG_DIR=/opt/spark/spark-events
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    volumes:
      - ./airflow/dags/scripts:/opt/spark/work-dir
      - ./jars/aws-java-sdk-bundle-1.12.540.jar:/opt/spark/jars/aws-java-sdk-bundle-1.12.540.jar
      - ./jars/hadoop-aws-3.3.4.jar:/opt/spark/jars/hadoop-aws-3.3.4.jar
      - ./spark-events:/opt/spark/spark-events
    ports:
      - "7077:7077"
      - "8081:8080"
    networks:
      - airflow-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 10s
      retries: 10
  
  spark-worker:
    image: apache/spark:3.5.1
    container_name: spark-worker
    restart: unless-stopped
    depends_on:
      - spark-master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    volumes:
      - ./airflow/dags/scripts:/opt/spark/work-dir
      - ./jars/aws-java-sdk-bundle-1.12.540.jar:/opt/spark/jars/aws-java-sdk-bundle-1.12.540.jar
      - ./jars/hadoop-aws-3.3.4.jar:/opt/spark/jars/hadoop-aws-3.3.4.jar
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./contracts:/opt/airflow/dags/contracts 
      - ./airflow/dags/scripts:/opt/spark/work-dir
      - ./spark-events:/opt/spark/spark-events
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=2g
      - SPARK_WORKER_CORES=2
      - SPARK_HISTORY_OPTS=-Dspark.history.fs.logDirectory=/opt/spark/spark-events
      - SPARK_EVENTLOG_ENABLED=true
      - SPARK_EVENTLOG_DIR=/opt/spark/spark-events
    networks:
      - airflow-net
    
  spark-history-server:
    image: apache/spark:3.5.1
    container_name: spark-history-server
    restart: unless-stopped
    environment:
      - SPARK_HISTORY_OPTS=-Dspark.history.fs.logDirectory=/opt/spark/spark-events
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.history.HistoryServer
    volumes:
      - ./spark-events:/opt/spark/spark-events
    ports:
      - "18080:18080"
    networks:
      - airflow-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18080"]
      interval: 10s
      retries: 10

  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_started
      spark-master:
        condition: service_started
    user: "0:0"
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_UPGRADE: 'true'        
      _AIRFLOW_WWW_USER_CREATE: 'true' 
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin
      _AIRFLOW_WWW_USER_EMAIL: admin@example.com
      _AIRFLOW_WWW_USER_ROLE: Admin
    command: version
    volumes:
      - ./contracts:/opt/airflow/dags/contracts
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/plugins:/opt/airflow/plugins
      - ./airflow/logs:/opt/airflow/logs
    

  airflow-webserver:
    <<: *airflow-common
    container_name: airflow-webserver
    user: "0:0"
    restart: unless-stopped
    depends_on:
      - airflow-init
    ports:
      - "8085:8080"
    command: webserver

    volumes:
      - ./contracts:/opt/airflow/dags/contracts
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/plugins:/opt/airflow/plugins
      - ./airflow/logs:/opt/airflow/logs

  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    restart: unless-stopped
    depends_on:
      - airflow-init
    command: scheduler
    volumes:
      - ./contracts:/opt/airflow/dags/contracts
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/plugins:/opt/airflow/plugins
      - ./airflow/logs:/opt/airflow/logs

  airflow-worker:
    <<: *airflow-common
    container_name: airflow-worker
    restart: unless-stopped
    depends_on:
      - airflow-init
      - spark-master
    command: celery worker
    volumes:
      - ./contracts:/opt/airflow/dags/contracts
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/plugins:/opt/airflow/plugins
      - ./airflow/logs:/opt/airflow/logs
      - ./spark-events:/opt/spark/spark-events

networks:
  airflow-net:
    driver: bridge

volumes:
  postgres_data:
  minio_data:

  